replicaCount: 2

image:
  repository: localhost/ensemble-storefront
  tag: latest
  pullPolicy: Never

service:
  type: NodePort
  port: 5000
  nodePort: 30100

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

env:
  INVENTORY_URL: "http://ensemble-inventory:5001"
  PYTHONUNBUFFERED: "1"

# Azure Logic App URLs — set after creating Logic Apps in Azure
# Leave empty to run in simulated mode (still generates realistic metrics)
azure:
  fraudCheckUrl: ""
  loyaltyPointsUrl: ""
  orderNotifyUrl: ""

# Chaos controls
chaos:
  checkoutDelay: "0"
  errorRate: "0"
  userMultiplier: "1"
  logicAppErrorRate: "0"
  logicAppSlowRate: "0"

annotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "5000"
  prometheus.io/path: "/metrics"
  