apiVersion: apps/v1
kind: Deployment
metadata:
  name: ensemble-inventory
  labels:
    app: ensemble-inventory
    component: inventory
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: ensemble-inventory
  template:
    metadata:
      labels:
        app: ensemble-inventory
        component: inventory
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: inventory
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 5001
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: CHAOS_DB_SATURATION
          value: {{ .Values.chaos.dbSaturation | quote }}
        - name: CHAOS_SLOW_QUERIES
          value: {{ .Values.chaos.slowQueries | quote }}
        - name: CHAOS_ERROR_RATE
          value: {{ .Values.chaos.errorRate | quote }}
        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: ensemble-inventory
  labels:
    app: ensemble-inventory
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: 5001
  selector:
    app: ensemble-inventory